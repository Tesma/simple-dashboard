<!DOCTYPE html>
<html>

<head>
    <title>Simple Dashboard</title>
    <meta charset="UTF-8">
    <link href="./style.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap"
        rel="stylesheet">
</head>

<body>
    <aside id="side-panel">
        <div id="side-cats">
            <div id="main-cat">

            </div>
            <div id="sec-cat">

            </div>
        </div>
    </aside>

    <header>
        <search>
            <button id='search-bt' class="filled-bt"><svg xmlns="http://www.w3.org/2000/svg" height="24px"
                    viewBox="0 -960 960 960" width="24px" fill='white'>
                    <path
                        d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z" />
                </svg> </button><input type="text">
        </search>
        <div id="profile">
            <button class="filled-bt"><svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960"
                    width="24px" fill="#e3e3e3">
                    <path
                        d="M160-200v-80h80v-280q0-83 50-147.5T420-792v-28q0-25 17.5-42.5T480-880q25 0 42.5 17.5T540-820v28q80 20 130 84.5T720-560v280h80v80H160Zm320-300Zm0 420q-33 0-56.5-23.5T400-160h160q0 33-23.5 56.5T480-80ZM320-280h320v-280q0-66-47-113t-113-47q-66 0-113 47t-47 113v280Z" />
                </svg></button>
            <button id="profile-bt">
                <img src="./lucas-pfp.png" alt="lucas profile picture" class="circle-img">
                <h3>Lucas Colli</h3>
            </button>
        </div>
    </header>

    <main id="main-page">
        <div id="main-grid">
            <div>
                <div id="left-grid">
                    <div class="profile">
                        <img src="./lucas-pfp.png" alt="lucas profile picture" class="circle-img">
                        <div class="profile-names">
                            <h3>Hi, there!</h3>
                            <h1>Lucas Colli (@lucascolli)</h1>
                        </div>

                        <div class="profile-buttons">
                            <button class="filled-bt" id="pf-new-bt">
                                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960"
                                    width="24px" fill="#e3e3e3">
                                    <path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z" />
                                </svg>
                            </button>
                            <button class="filled-bt" id="pf-upload-bt">
                                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960"
                                    width="24px" fill="#e3e3e3">
                                    <path
                                        d="M440-320h80v-168l64 64 56-56-160-160-160 160 56 56 64-64v168Zm40 240q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z" />
                                </svg>
                            </button>
                            <button class="filled-bt" id="pf-share-bt">
                                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960"
                                    width="24px" fill="#e3e3e3">
                                    <path
                                        d="M680-80q-50 0-85-35t-35-85q0-6 3-28L282-392q-16 15-37 23.5t-45 8.5q-50 0-85-35t-35-85q0-50 35-85t85-35q24 0 45 8.5t37 23.5l281-164q-2-7-2.5-13.5T560-760q0-50 35-85t85-35q50 0 85 35t35 85q0 50-35 85t-85 35q-24 0-45-8.5T598-672L317-508q2 7 2.5 13.5t.5 14.5q0 8-.5 14.5T317-452l281 164q16-15 37-23.5t45-8.5q50 0 85 35t35 85q0 50-35 85t-85 35Zm0-80q17 0 28.5-11.5T720-200q0-17-11.5-28.5T680-240q-17 0-28.5 11.5T640-200q0 17 11.5 28.5T680-160ZM200-440q17 0 28.5-11.5T240-480q0-17-11.5-28.5T200-520q-17 0-28.5 11.5T160-480q0 17 11.5 28.5T200-440Zm508.5-291.5Q720-743 720-760t-11.5-28.5Q697-800 680-800t-28.5 11.5Q640-777 640-760t11.5 28.5Q663-720 680-720t28.5-11.5ZM680-200ZM200-480Zm480-280Z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div id="projects">
                        <h2>Your Projects</h2>
                        <div id="projects-grid">
                        </div>
                    </div>
                </div>
            </div>
            <div id="right-grid">
                <div>
                    <h3>Announcements</h3>
                    <div id="an-content">
                        <div id="announce">
                            
                        </div>
                    </div>
                </div>
                <div>
                    <h3>Trending</h3>
                    <div id="trending">

                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="./scripts.js"></script>
</body>

</html>
